<!DOCTYPE html><html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کافه نمک</title><style>
body{
font-family:tahoma,sans-serif;
background:#f8f2e8;
padding:20px;
}
.container{
max-width:600px;
margin:auto;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}
h1{
text-align:center;
color:#6f4e37;
}
input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;
}
button{
width:100%;
padding:14px;
background:#6f4e37;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}
#result{
display:none;
margin-top:20px;
padding:15px;
background:#e8f5e9;
border-radius:10px;
text-align:center;
}
</style></head><body><div class="container"><h1>☕ کافه نمک</h1><form id="orderForm"><label>نام مهمان *</label>
<input id="name" type="text" required>

<label>نوشیدنی *</label>
<select id="drink" required>

<option>آیس لاته</option>
<option>آمریکانو</option>
<option>لاته</option>
<option>کاپوچینو</option>
<option>اسپرسو تک</option>
<option>اسپرسو دبل</option>
<option>چای</option>
<option>آب جوش</option>
<option>لانگ بلک</option>
</select><label>تعداد *</label>
<input id="count" type="number" min="1" value="1" required>

<label>توضیحات</label>

<textarea id="note" rows="4"></textarea><button type="submit">ثبت سفارش</button>

</form><div id="result">
☕ سفارش شما ثبت شد<br><br>
میزبان به‌زودی نوشیدنی شما را آماده می‌کند.<br><br>
از حضور شما در کافه نمک سپاسگزاریم 🌿
با تشکر
  <br>
کیان حسینائی
</div>
</div></div><script>
document.getElementById("orderForm").addEventListener("submit", async function(e){
e.preventDefault();

const data = {
name: document.getElementById("name").value,
drink: document.getElementById("drink").value,
count: document.getElementById("count").value,
note: document.getElementById("note").value
};

try{
const res = await fetch("/.netlify/functions/send-order",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

if(res.ok){
document.getElementById("orderForm").style.display="none";
document.getElementById("result").style.display="block";
}else{
alert("خطا در ارسال سفارش");
}
}catch(err){
alert("خطا در ارسال سفارش");
}
});
</script></body>
</html>
